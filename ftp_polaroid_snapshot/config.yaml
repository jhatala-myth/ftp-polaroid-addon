name: "FTP Polaroid Snapshot"
description: >
  Fetches the latest MOV file from an FTP server, extracts frames,
  and creates a polaroid-style image: a single photo when < 4 frames
  are found, or a 2×2 matrix when >= 4 frames are found.
  Background and text colours are fully configurable.
version: "1.4.0"
slug: "ftp_polaroid_snapshot"
init: false
homeassistant_api: false
hassio_api: false
auth_api: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - media:rw
options:
  ftp_host: ""
  ftp_port: 21
  ftp_user: "anonymous"
  ftp_password: ""
  ftp_path: "/"
  output_dir: "/media/polaroid"
  interval_minutes: 5
  background_color: "#FFFFFF"
  text_color: "#505050"
schema:
  ftp_host: str
  ftp_port: int
  ftp_user: str
  ftp_password: str
  ftp_path: str
  output_dir: str
  interval_minutes: int(1,1440)
  background_color: "match(^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$)"
  text_color: "match(^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$)"
