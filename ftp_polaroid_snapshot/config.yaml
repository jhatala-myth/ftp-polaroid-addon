name: "FTP Polaroid Snapshot"
description: "Fetches the latest MOV file from an FTP server every 5 minutes, extracts frames, and creates a 2x2 polaroid-style contact sheet saved to /media."
version: "1.0.0"
slug: "ftp_polaroid_snapshot"
init: false
homeassistant_api: false
hassio_api: false
auth_api: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - media:rw
options:
  ftp_host: ""
  ftp_port: 21
  ftp_user: "anonymous"
  ftp_password: ""
  ftp_path: "/"
  output_dir: "/media/polaroid"
  interval_minutes: 5
schema:
  ftp_host: str
  ftp_port: int
  ftp_user: str
  ftp_password: str
  ftp_path: str
  output_dir: str
  interval_minutes: int
